[[mcp_servers]]
name = "heroui-react"
transport = "stdio"
command = "npx"
args = ["-y", "@heroui/react-mcp@latest"]

[[mcp_servers]]
name = "serena"
transport = "stdio"
command = "uvx"
args = [
    "--from",
    "git+https://github.com/oraios/serena",
    "serena",
    "start-mcp-server",
    "--open-web-dashboard",
    "false",
    "--context",
    "ide",
    "--project",
    "$(pwd)",
]
