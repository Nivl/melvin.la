name: webapp

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
    branches:
      - main

permissions:
  contents: read

# Don't run more than one workflow for the same branch at a time
# This is to save credits on the CI provider
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  prepare-env:
    name: detect what files changed
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.changes.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - run: git config --global --add safe.directory /__w/melvin.la/melvin.la
      - name: Check for file changes
        uses: dorny/paths-filter@f3ceefdc7ef57bc2d8560787d4b6c33e44044cec
        id: changes
        with:
          token: ${{ github.token }}
          # Negation is kinda weird in paths-filter (picomatch).
          # Test at https://rapidtoolset.com/en/tool/glob-pattern-tester
          #   Make sure to enable "Match Dotfiles"
          #
          # If you want everything BUT markdown files, you cannot say:
          #    - 'web/**'
          #    - '!web/**/*.md'
          # The negation doesn't remove all the .md files that have been
          # matched. Instead it matches everything that is not a .md file.
          #
          # Which means that using:
          #    - 'web/**'
          #    - '!web/**/*.md'
          # Will match the whole codebase as it does:
          #    - web/** => Everything including the .md files
          #    - !web/**/*.md => Everything but the .md files
          filters: |
            src:
              - '!(.mcp)*.json'
              - '*.y(a)?ml'
              - '.nvmrc'
              - '(apps|packages)/**/!(*.md|.gitkeep)'
              - '.github/workflows/webapp.yml'
              - '.github/actions/node-setup/**'

  build:
    if: needs.prepare-env.outputs.code-changed == 'true'
    needs: [ prepare-env ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: "./.github/actions/node-setup"

      - uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.turbo
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - run: pnpm run build

  lint:
    if: needs.prepare-env.outputs.code-changed == 'true'
    needs: [ prepare-env ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: "./.github/actions/node-setup"

      - name: Validate Code
        run: pnpm run validate-code

  unit-test:
    if: needs.prepare-env.outputs.code-changed == 'true'
    needs: [ prepare-env ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: "./.github/actions/node-setup"
      - run: pnpm run test:unit

  resolve-playwright-version:
    if: needs.prepare-env.outputs.code-changed == 'true'
    needs: [ prepare-env ]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps['resolve-playwright-version'].outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: resolve-playwright-version
        id: resolve-playwright-version
        run: |
          version="$(yq -r '.catalog["@playwright/test"] // .dependencies["@playwright/test"] // ""' pnpm-workspace.yaml)"
          test -n "$version" || { echo "No @playwright/test version found in pnpm-workspace.yaml"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

  www-e2e-test:
    if: needs.prepare-env.outputs.code-changed == 'true'
    needs: [ resolve-playwright-version ]
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{
        needs['resolve-playwright-version'].outputs.version }}
      options: --user 1001
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: "./.github/actions/node-setup"
      - run: pnpm run test:e2e
        working-directory: ./apps/www
      - name: Upload Playwright Reports
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-reports
          path: "apps/www/playwright-report/" # Set your reports path here
          retention-days: 3

  # sIn order to save chromatic credits, we only run this one:
  #  - after everything else has passed
  #  - On any non-draft PRs
  #  - On any push to the main branch
  www-chromatic:
    if: |
      needs.prepare-env.outputs.code-changed == 'true' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event.pull_request.draft == false))
    needs: [ prepare-env, lint, unit-test, www-e2e-test, build ]
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup
        uses: "./.github/actions/node-setup"

      - name: Run Chromatic
        uses: chromaui/action@8a2b82547aef5a3efc8ec3c7905f4ab09a76ed0b
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: ./apps/www
          exitZeroOnChanges: true
          autoAcceptChanges: main
          onlyChanged: true

  # This job is what github action will check to see if a PR is ready to
  # be merged.
  webapp-required-check:
    needs: [ prepare-env, build, lint, unit-test, www-e2e-test, www-chromatic ]
    # This is necessary since a failed/skipped dependent job would cause this job to be skipped
    if: always()
    runs-on: ubuntu-latest
    steps:
      # If any jobs we depend on fail, we will fail since this is a required check
      # NOTE: A timeout is considered a failure
      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
